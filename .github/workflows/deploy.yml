name: CI/CD Deploy

on:
  push:
    branches: [main]

jobs:

  # ── TESTES DO BACKEND ─────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: laravel_docker_test
          POSTGRES_USER: laravel_docker
          POSTGRES_PASSWORD: secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_pgsql, redis, zip, pcntl
          coverage: none

      - name: Instalar dependencias
        working-directory: backend
        run: composer install --prefer-dist --no-progress

      - name: Copiar .env
        working-directory: backend
        run: cp .env.example .env

      - name: Gerar app key
        working-directory: backend
        run: php artisan key:generate

      - name: Rodar migrations
        working-directory: backend
        run: php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: laravel_docker_test
          DB_USERNAME: laravel_docker
          DB_PASSWORD: secret

      - name: Pint (lint)
        working-directory: backend
        run: ./vendor/bin/pint --test

      - name: Pest (testes)
        working-directory: backend
        run: php artisan test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: laravel_docker_test
          DB_USERNAME: laravel_docker
          DB_PASSWORD: secret

  # ── BUILD DO FRONTEND ─────────────────────────────────────────────────────
  # Roda em paralelo com o test
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Build Quasar
        working-directory: frontend
        run: npx quasar build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/spa
          retention-days: 1

  # ── DEPLOY NO VPS ─────────────────────────────────────────────────────────
  deploy:
    needs: [test, build-frontend]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Baixar build do frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/spa

      - name: Enviar frontend para o VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "frontend/dist/spa/*"
          target: "/opt/laravel-docker/frontend/dist/spa"
          strip_components: 3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/laravel-docker

            echo "=== Git pull ==="
            git pull origin main

            echo "=== Rebuild e subindo containers ==="
            docker compose -f docker-compose.prod.yml up -d --build --no-deps app nginx

            echo "=== Migrations ==="
            docker compose -f docker-compose.prod.yml exec -T app php artisan migrate --force

            echo "=== Cache ==="
            docker compose -f docker-compose.prod.yml exec -T app php artisan optimize

            echo "=== Deploy concluido! ==="
