# ── Redireciona HTTP para HTTPS + Certbot challenge ─────────────────────────
server {
    listen 80;
    server_name SEU_DOMINIO;

    # Certbot precisa responder nesse path para validar o dominio
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo o resto vai para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name SEU_DOMINIO;

    # Certificados gerados pelo Certbot
    ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO/privkey.pem;

    # SSL seguro
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Headers de seguranca
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── API LARAVEL ──────────────────────────────────────────────────────────
    # Todas as rotas /api/* e /sanctum/* vao para o PHP-FPM
    location ~ ^/(api|sanctum|horizon|telescope) {
        root /var/www/html/public;

        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass app:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
            include fastcgi_params;
        }
    }

    # ── FRONTEND QUASAR (SPA) ────────────────────────────────────────────────
    # Todo o resto serve os arquivos estaticos do build do Quasar
    location / {
        root /var/www/frontend;
        index index.html;
        # Necessario para SPA — todas as rotas caem no index.html
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estaticos do frontend
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        root /var/www/frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
