server {
    listen 80;
    server_name localhost;

    # Raiz aponta para o public/ do Laravel
    root /var/www/html/public;
    index index.php;

    # Todas as requisições passam pelo index.php (roteamento do Laravel)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Passa requisições PHP para o PHP-FPM
    # "app" é o nome do serviço no compose — DNS interno resolvido automaticamente
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }
}