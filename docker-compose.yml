name: nfse-monorepo

services:

  # ── BACKEND (Laravel API + Supervisor) ─────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: nfse_app
    restart: unless-stopped
    ports:
      - "8095:8085"   # Reverb WebSocket (8095 host pra evitar conflito c/ outros projetos)
    volumes:
      # Bind mount apenas do backend — mudanças refletem sem rebuild
      - ./backend:/var/www/html
      # Protege o vendor/ gerado no container (compilado para Linux)
      - /var/www/html/vendor
    env_file:
      - ./backend/.env
    networks:
      - nfse_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── NGINX ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nfse_nginx
    restart: unless-stopped
    ports:
      - "8089:80"   # 8089 host (várias outras portas locais ocupadas)
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - nfse_net
    depends_on:
      - app

  # ── FRONTEND (Quasar dev server) ───────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: nfse_frontend
    working_dir: /app
    # Instala dependências e sobe o dev server do Quasar
    command: sh -c "npm install && npx quasar dev"
    ports:
      - "9100:9100"   # acessa o frontend em localhost:9100
    volumes:
      # Bind mount do frontend — hot reload funciona normalmente
      - ./frontend:/app
    environment:
      # Força o Quasar a escutar em todas as interfaces (necessário no Docker)
      HOST: "0.0.0.0"
      PORT: "9100"
      BACKEND_URL: "http://nginx"
      REVERB_APP_KEY: "r4opkfknvdt6u2byu46n"
      REVERB_HOST: "localhost"
      REVERB_PORT: "8085"
      REVERB_SCHEME: "http"
    networks:
      - nfse_net

  # ── POSTGRESQL ─────────────────────────────────────────────────────────────
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: nfse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nfse
      POSTGRES_USER: nfse
      POSTGRES_PASSWORD: secret
      POSTGRES_INITDB_ARGS: "--locale=pt_BR.UTF-8"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel_docker -d laravel_docker"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nfse_net

  # ── REDIS ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nfse_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nfse_net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  nfse_net:
    driver: bridge
