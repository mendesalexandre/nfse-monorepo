name: nfse-monorepo-prod

services:

  # ── BACKEND (Laravel API + Supervisor) ─────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: nfse_app
    restart: always
    # Cert PFX em volume read-only — único bind mount necessário
    # (NUNCA dentro da image — perderia em rebuild + dados sensíveis).
    # Código/vendor ficam dentro da image (build-time).
    volumes:
      - ./backend/storage/certs:/var/www/html/storage/certs:ro
    env_file:
      - ./backend/.env.prod
    networks:
      - nfse_prod_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── NGINX ──────────────────────────────────────────────────────────────────
  # Em produção o Nginx serve:
  #   /api/*  → PHP-FPM (Laravel)
  #   /*      → arquivos estáticos do Quasar buildado
  nginx:
    image: nginx:alpine
    container_name: nfse_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      # Build do Quasar gerado pelo CI antes do deploy
      - ./frontend/dist/spa:/var/www/frontend:ro
      # Certbot — certificados e challenge
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - nfse_prod_net
    depends_on:
      - app

  # ── CERTBOT (SSL) ─────────────────────────────────────────────────────────
  # Renova certificados automaticamente a cada 12h
  certbot:
    image: certbot/certbot
    container_name: nfse_certbot
    restart: unless-stopped
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - nfse_prod_net

  # ── POSTGRESQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:18
    container_name: nfse_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # SEM ports — banco não fica exposto em produção
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nfse_prod_net

  # ── REDIS ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nfse_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    # SEM ports — Redis não fica exposto em produção
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nfse_prod_net

  # ── PORTAINER (Monitoramento) ──────────────────────────────────────────────
  # Acesse em https://seu-dominio.com.br:9443
  portainer:
    image: portainer/portainer-ce:latest
    container_name: nfse_portainer
    restart: always
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - nfse_prod_net

volumes:
  postgres_data:
  redis_data:
  certbot_certs:
  certbot_www:
  portainer_data:

networks:
  nfse_prod_net:
    driver: bridge
